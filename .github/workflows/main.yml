name: "CI"
on: [push]
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
jobs:
  ci:
    timeout-minutes: 60
    runs-on: self-hosted
    container:
      image: docker.internal.networkradius.com/self-hosted
      #  "privileged" is needed for Samba install
      #  "memory-swap -1" enables full use of host swap and may help
      #    with containers randomly quitting with "The operation was
      #    canceled"
      options: >-
        --privileged
        --memory-swap -1
    strategy:
      fail-fast: false
    env:
      apt-install: sudo apt-get install -y --no-install-recommends
      # Lua version used for the test harness. Must be >= 5.2: Lua 5.1
      # hits "attempt to yield across metamethod/C-call boundary" in
      # cqueues/lua-http.
      lua_version: "5.4"
      nginx_config_args: |
        --prefix=/usr/local/openresty \
        --conf-path=/etc/nginx/nginx.conf \
        --error-log-path=/var/log/nginx/error.log \
        --http-log-path=/var/log/nginx/access.log \
        --user=root \
        --group=root \
        --with-http_ssl_module \
        --with-file-aio \
        --with-debug \
        --with-pcre \
        --with-pcre-jit \
        --with-http_stub_status_module \
        --with-http_auth_request_module \
        --add-dynamic-module=../
      openresty_base_url: https://openresty.org/download
      openresty_version: 1.27.1.1
    #
    #  GitHub Actions service mechanism gives us an OpenLDAP container
    #  reachable as `openldap:389` from the runner container's docker
    #  network. The runner image has no docker, so we can't drive
    #  ldap-container.sh's `docker run` path here.
    #
    services:
      openldap:
        image: bitnamilegacy/openldap:latest
        ports:
          - 389:389
        env:
          LDAP_PORT_NUMBER: 389
          LDAP_ROOT: dc=example,dc=org
          LDAP_ADMIN_USERNAME: manager
          LDAP_ADMIN_PASSWORD: password
          LDAP_CONFIG_ADMIN_ENABLED: yes
          LDAP_CONFIG_ADMIN_USERNAME: manager
          LDAP_CONFIG_ADMIN_PASSWORD: password
          LDAP_USERS: testuser
          LDAP_PASSWORDS: testpass
          LDAP_ENABLE_SYNCPROV: true
    steps:
      - name: Setup - Lua-version-derived env vars
        run: echo "lua_bin=lua${{ env.lua_version }}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive
          # Needed for submodule refs which aren't pointing to the head commit
          fetch-depth: 100

      - name: NGINX - Generate cache key hash
        run: echo "CACHE_KEY=$(echo "${{ runner.os }}-${{ env.openresty_version }}-${{ env.nginx_config_args }}" | sha256sum | cut -d ' ' -f1)" >> $GITHUB_ENV

      - name: NGINX - Install basic dependencies
        run: |
          sudo apt-get update
          # Standard build dependencies
          ${{ env.apt-install }} \
            build-essential \
            devscripts \
            equivs \
            quilt \
            clang \
            llvm \
            lldb \
            strace
          # NGINX specific build dependencies
          ${{ env.apt-install }} \
            perl \
            libpcre3-dev \
            libssl-dev \
            libpqxx-dev \
            libpq-dev \
            libldap-dev \
            zlib1g-dev

      - name: Get number of CPU cores
        uses: SimenB/github-actions-cpu-cores@v2
        id: cpu-cores
        
      #
      #  Build and install openresty with out custom Async
      #  lua LDAP connector.
      #
      - name: NGINX - Restore build directory
        id: nginx-build-restore
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/openresty-${{ env.openresty_version }}
          key: ${{ env.CACHE_KEY }}

      - name: NGINX - Download (if not cached)
        if: steps.nginx-build-restore.outputs.cache-hit != 'true'
        run: |
          wget ${{ env.openresty_base_url }}/openresty-${{ env.openresty_version }}.tar.gz
          tar -xzf openresty-${{ env.openresty_version }}.tar.gz

      - name: NGINX - Configure
        if: steps.nginx-build-restore.outputs.cache-hit != 'true'
        working-directory: openresty-${{ env.openresty_version }}
        run: |
          MAKEFLAGS="-j ${{ steps.cpu-cores.outputs.count }}" ./configure ${{ env.nginx_config_args }}

      # Cache the last build state.  This should mean that make only rebuilds
      # files where the openresty version changes, the configure args change
      # or the lua ldap submodule commit changes.
      - name: NGINX - Cache build state
        if: steps.nginx-build-restore.outputs.cache-hit != 'true'
        id: nginx-build-store
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ github.workspace }}/openresty-${{ env.openresty_version  }}
          key: ${{ env.CACHE_KEY }}

      - name: NGINX - Build
        working-directory: openresty-${{ env.openresty_version }}
        run: make -j ${{ steps.cpu-cores.outputs.count }}

      - name: NGINX - Install
        working-directory: openresty-${{ env.openresty_version }}
        run: sudo make install -j ${{ steps.cpu-cores.outputs.count }}

      - name: Tests - Install Lua, test deps, and tooling
        run: |
          ${{ env.apt-install }} ${{ env.lua_bin }} liblua${{ env.lua_version }}-dev luarocks ldap-utils socat netcat-openbsd
          sudo luarocks --lua-version ${{ env.lua_version }} install --only-deps lualdap-nginx-tests-dev-1.rockspec
          # dapman-http-unit lives in a private sibling repo. Install it from
          # the Inkbridge LuaRocks server.
          sudo luarocks --lua-version ${{ env.lua_version }} --server=https://luarocks.inkbridge.io/ install dapman-http-unit
          # Cap the per-request HTTP timeout to 5s so a stuck endpoint
          # surfaces fast rather than hanging the whole CI step. (Patches
          # the installed copy directly; once dapman-http-unit reads its
          # timeout from an env var this can become DAPMAN_HTTP_UNIT_TIMEOUT.)
          sudo sed -i 's/^local test_timeout = .*/local test_timeout = 5/' \
            /usr/local/share/lua/${{ env.lua_version }}/dapman-http-unit/init.lua

      - name: OpenLDAP - Wait for service
        run: |
          for i in $(seq 1 60); do
            ldapsearch -H ldap://openldap:389 -D 'cn=manager,dc=example,dc=org' -w password -b dc=example,dc=org -s base >/dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "ERROR: openldap did not become ready in time" >&2
          exit 1

      #
      #  Grant cn=testuser,ou=users write access to dc=example,dc=org. The
      #  proxy_id tests bind as manager and use proxy authz to perform
      #  writes as testuser; without this ACL the writes would fail.
      #  Mirrors the bootstrap that ldap-container.sh applies via
      #  docker exec / SASL EXTERNAL when the container is run locally.
      #
      - name: OpenLDAP - Apply testuser ACL
        run: |
          ldapmodify -H ldap://openldap:389 -D 'cn=manager,cn=config' -w password <<'EOF'
          dn: olcDatabase={2}mdb,cn=config
          changetype: modify
          add: olcAccess
          olcAccess: {0}to dn.subtree="dc=example,dc=org" by dn="cn=testuser,ou=users,dc=example,dc=org" write by * read
          EOF

      #
      #  Endpoint configs and tests default to 127.0.0.1:1389. Forward that
      #  to the openldap service so we don't have to plumb a host/port arg
      #  through every test call.
      #
      - name: Tests - Forward LDAP to localhost:1389
        run: |
          socat TCP-LISTEN:1389,fork,reuseaddr TCP:openldap:389 &
          for i in $(seq 1 10); do nc -z 127.0.0.1 1389 && exit 0; sleep 0.5; done
          echo "ERROR: socat forwarder did not come up" >&2
          exit 1

      #
      #  Start nginx in background. nginx-service.sh handles the prefix
      #  setup; we point NGINX_BIN at the system install (rather than the
      #  script's default ./build/nginx/sbin/nginx, which doesn't exist in
      #  CI since openresty was built into ./openresty-1.27.1.1/).
      #
      - name: Tests - Start nginx
        env:
          NGINX_BIN: /usr/local/openresty/nginx/sbin/nginx
        run: |
          ./nginx-service.sh start bg
          for i in $(seq 1 40); do nc -z 127.0.0.1 8090 && exit 0; sleep 0.5; done
          echo "ERROR: nginx did not bind 8090 in time" >&2
          tail -200 build/test/log/debug.log 2>/dev/null || true
          exit 1

      - name: Tests - Run lualdap test suite
        # Hard wall-clock cap. With 57 tests at <=5s per HTTP request,
        # a healthy run takes well under a minute; if we're past 5 minutes
        # something is genuinely hung and we'd rather fail fast.
        timeout-minutes: 5
        env:
          # run-tests.sh reads LUA54 (the env var historically named for
          # the dev default Lua 5.4); set it from lua_bin so a future
          # version bump touches only `lua_version` above.
          LUA54: /usr/bin/${{ env.lua_bin }}
        run: |
          eval "$(luarocks --lua-version ${{ env.lua_version }} path)"
          # --verbose makes luaunit emit per-test status as it runs rather
          # than buffering until the end; if a test hangs we can see which
          # one in the live log.
          /usr/bin/${{ env.lua_bin }} bin/run_tests --verbose

      - name: On Failure - Dump nginx debug log
        if: failure()
        run: tail -300 build/test/log/debug.log 2>/dev/null || true

      - name: "On Failure - Start tmate"
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
        if: ${{ github.ref == 'refs/heads/ci-debug' && failure() }}

