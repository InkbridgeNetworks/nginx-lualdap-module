name: "CI"
on: [push]
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
jobs:
  ci:
    timeout-minutes: 60
    runs-on: self-hosted
    container:
      image: docker.internal.networkradius.com/self-hosted
      #  "privileged" is needed for Samba install
      #  "memory-swap -1" enables full use of host swap and may help
      #    with containers randomly quitting with "The operation was
      #    canceled"
      options: >-
        --privileged
        --memory-swap -1
    strategy:
      fail-fast: false
    env:
      apt-install: sudo apt-get install -y --no-install-recommends
      nginx_config_args: |
        --prefix=/usr/local/openresty \
        --conf-path=/etc/nginx/nginx.conf \
        --error-log-path=/var/log/nginx/error.log \
        --http-log-path=/var/log/nginx/access.log \
        --user=root \
        --group=root \
        --with-http_ssl_module \
        --with-file-aio \
        --with-debug \
        --with-pcre \
        --with-pcre-jit \
        --with-http_stub_status_module \
        --with-http_auth_request_module \
        --add-dynamic-module=../
      openresty_base_url: https://openresty.org/download
      openresty_version: 1.27.1.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive
          # Needed for submodule refs which aren't pointing to the head commit
          fetch-depth: 100

      - name: NGINX - Generate cache key hash
        run: echo "CACHE_KEY=$(echo "${{ runner.os }}-${{ env.openresty_version }}-${{ env.nginx_config_args }}" | sha256sum | cut -d ' ' -f1)" >> $GITHUB_ENV

      - name: NGINX - Install basic dependencies
        run: |
          sudo apt-get update
          # Standard build dependencies
          ${{ env.apt-install }} \
            build-essential \
            devscripts \
            equivs \
            quilt \
            clang \
            llvm \
            lldb \
            strace
          # NGINX specific build dependencies
          ${{ env.apt-install }} \
            perl \
            libpcre3-dev \
            libssl-dev \
            libpqxx-dev \
            libpq-dev \
            libldap-dev \
            zlib1g-dev

      - name: Get number of CPU cores
        uses: SimenB/github-actions-cpu-cores@v2
        id: cpu-cores
        
      #
      #  Build and install openresty with out custom Async
      #  lua LDAP connector.
      #
      - name: NGINX - Restore build directory
        id: nginx-build-restore
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/openresty-${{ env.openresty_version }}
          key: ${{ env.CACHE_KEY }}

      - name: NGINX - Download (if not cached)
        if: steps.nginx-build-restore.outputs.cache-hit != 'true'
        run: |
          wget ${{ env.openresty_base_url }}/openresty-${{ env.openresty_version }}.tar.gz
          tar -xzf openresty-${{ env.openresty_version }}.tar.gz

      - name: NGINX - Configure
        if: steps.nginx-build-restore.outputs.cache-hit != 'true'
        working-directory: openresty-${{ env.openresty_version }}
        run: |
          MAKEFLAGS="-j ${{ steps.cpu-cores.outputs.count }}" ./configure ${{ env.nginx_config_args }}

      # Cache the last build state.  This should mean that make only rebuilds
      # files where the openresty version changes, the configure args change
      # or the lua ldap submodule commit changes.
      - name: NGINX - Cache build state
        if: steps.nginx-build-restore.outputs.cache-hit != 'true'
        id: nginx-build-store
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ github.workspace }}/openresty-${{ env.openresty_version  }}
          key: ${{ env.CACHE_KEY }}

      - name: NGINX - Build
        working-directory: openresty-${{ env.openresty_version }}
        run: make -j ${{ steps.cpu-cores.outputs.count }}

      - name: NGINX - Install
        working-directory: openresty-${{ env.openresty_version }}
        run: sudo make install -j ${{ steps.cpu-cores.outputs.count }}

      - name: Tests - Install Lua and test dependencies
        run: |
          ${{ env.apt-install }} lua5.4 liblua5.4-dev luarocks ldap-utils
          sudo luarocks --lua-version 5.4 install --only-deps lualdap-nginx-tests-dev-1.rockspec

      #
      #  bin/run_tests requires `dapman-http-unit` from the parent SubMan
      #  project (it lives outside this submodule). Pull it in via a sparse
      #  checkout and place it on the test runner's package path.
      #
      - name: Tests - Checkout dapman-http-unit from parent SubMan
        uses: actions/checkout@v4
        with:
          repository: InkbridgeNetworks/SubMan
          path: subman-checkout
          sparse-checkout: src/http-unit
          sparse-checkout-cone-mode: false

      - name: Tests - Stage dapman-http-unit
        run: ln -sf "${{ github.workspace }}/subman-checkout/src/http-unit/init.lua" tests/dapman-http-unit.lua

      #
      #  ./run-tests.sh starts the LDAP container itself (via
      #  ldap-container.sh, which uses `docker run`) and then nginx via
      #  ./nginx-service.sh. The runner image is privileged so docker-in-
      #  docker works. We override NGINX_BIN to point at the system install
      #  rather than the script's default ./build/nginx/sbin/nginx.
      #
      - name: Tests - Run lualdap test suite
        env:
          NGINX_BIN: /usr/local/openresty/nginx/sbin/nginx
          LUA54: /usr/bin/lua5.4
        run: |
          eval "$(luarocks --lua-version 5.4 path)"
          ./run-tests.sh

      - name: "On Failure - Start tmate"
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
        if: ${{ github.ref == 'refs/heads/ci-debug' && failure() }}

