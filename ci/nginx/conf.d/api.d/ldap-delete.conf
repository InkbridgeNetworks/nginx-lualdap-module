location = /ldap-delete {
    default_type    application/json;

    content_by_lua_block {
        local lualdap = require("ngx_lualdap")
        local cjson   = require("cjson")

        local ldap_host = ngx.var.arg_host or "127.0.0.1"
        local ldap_port = tonumber(ngx.var.arg_port) or 1389
        local ldap_bind = ngx.var.arg_bind or "cn=manager,dc=example,dc=org"
        local ldap_pass = ngx.var.arg_pass or "password"
        local dn        = ngx.var.arg_dn

        if not dn then
            ngx.status = 400
            ngx.say(cjson.encode({ ok = false, err = "dn is required" }))
            return
        end

        local sock = ngx.socket.tcp()
        sock:settimeout(5000)

        local ok, err = sock:connect(ldap_host, ldap_port)
        if not ok then
            ngx.status = 502
            ngx.say(cjson.encode({ ok = false, err = "connect: " .. err }))
            return
        end

        local conn = lualdap.init()
        local ok, err = conn:init_fd(sock, ldap_bind, ldap_pass, true)
        if not ok then
            ngx.status = 502
            ngx.say(cjson.encode({ ok = false, err = "bind: " .. tostring(err) }))
            return
        end

        local opts
        if ngx.var.arg_proxy_id then
            opts = { proxy_id = ngx.var.arg_proxy_id }
        end
        local result_fn = conn:delete(sock, dn, opts)
        local ok, err, code = result_fn()
        if not ok then
            ngx.status = 500
            ngx.say(cjson.encode({ ok = false, err = tostring(err), code = code }))
            conn:close()
            return
        end

        conn:close()
        ngx.say(cjson.encode({ ok = true }))
    }
}
