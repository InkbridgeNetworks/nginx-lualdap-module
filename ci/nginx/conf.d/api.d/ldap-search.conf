location = /ldap-search {
    default_type    application/json;

    content_by_lua_block {
        local lualdap = require("ngx_lualdap")
        local cjson   = require("cjson")

        local ldap_host = ngx.var.arg_host     or "127.0.0.1"
        local ldap_port = tonumber(ngx.var.arg_port) or 1389
        local ldap_bind = ngx.var.arg_bind     or "cn=manager,dc=example,dc=org"
        local ldap_pass = ngx.var.arg_pass     or "password"
        local ldap_base = ngx.var.arg_base     or "dc=example,dc=org"
        local ldap_filter  = ngx.var.arg_filter   or "(objectClass=*)"
        local ldap_scope   = ngx.var.arg_scope    or "sub"
        local ldap_pagesize  = tonumber(ngx.var.arg_pagesize) or 0
        local ldap_sizelimit = tonumber(ngx.var.arg_sizelimit) or 0
        local ldap_attrsonly = ngx.var.arg_attrsonly == "1"
        local ldap_proxy_id  = ngx.var.arg_proxy_id

        -- Optional comma-separated attribute list. Lets tests request
        -- operational attributes like creatorsName/modifiersName.
        local ldap_attrs
        if ngx.var.arg_attrs then
            ldap_attrs = {}
            for a in string.gmatch(ngx.var.arg_attrs, "[^,]+") do
                ldap_attrs[#ldap_attrs + 1] = a
            end
        end

        local sock = ngx.socket.tcp()
        sock:settimeout(5000)

        local ok, err = sock:connect(ldap_host, ldap_port)
        if not ok then
            ngx.status = 502
            ngx.say(cjson.encode({ ok = false, err = "connect: " .. err }))
            return
        end

        local conn = lualdap.init()
        local ok, err = conn:init_fd(sock, ldap_bind, ldap_pass, true)
        if not ok then
            ngx.status = 502
            ngx.say(cjson.encode({ ok = false, err = "bind: " .. tostring(err) }))
            return
        end

        local ok, iter_or_err, search = pcall(conn.search, conn, sock, ldap_base, ldap_filter, ldap_scope, ldap_attrs, {
            pagesize  = ldap_pagesize,
            sizelimit = ldap_sizelimit,
            attrsonly = ldap_attrsonly,
            proxy_id  = ldap_proxy_id,
        })
        if not ok then
            ngx.status = 500
            ngx.say(cjson.encode({ ok = false, err = tostring(iter_or_err) }))
            conn:close()
            return
        end
        local iter = iter_or_err

        local entries = {}
        while true do
            local dn, attrs = iter()
            if dn == nil then break end
            entries[#entries + 1] = { dn = dn, attrs = attrs }
        end

        local more = search:more_pages()

        conn:close()
        ngx.say(cjson.encode({ ok = true, entries = entries, more_pages = more }))
    }
}
