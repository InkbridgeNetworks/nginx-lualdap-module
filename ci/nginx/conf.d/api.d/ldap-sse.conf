location = /ldap-sse {
    default_type    text/event-stream;
    lua_http10_buffering off;

    content_by_lua_block {
        local lualdap = require("ngx_lualdap")
        local cjson   = require("cjson")

        local ldap_host    = ngx.var.arg_host   or "127.0.0.1"
        local ldap_port    = tonumber(ngx.var.arg_port)   or 1389
        local ldap_base    = ngx.var.arg_base   or "dc=example,dc=org"
        local ldap_bind    = ngx.var.arg_bind   or "cn=manager,dc=example,dc=org"
        local ldap_pass    = ngx.var.arg_pass   or "password"
        local ldap_filter  = ngx.var.arg_filter or "(objectClass=*)"
        local ldap_attrs   = ngx.var.arg_attrs
        local ldap_cookie  = ngx.var.arg_cookie
        local iter_timeout = 0  -- 0 = no timeout; iter() yields the coroutine until the next LDAP message arrives

        ngx.header["Content-Type"]      = "text/event-stream"
        ngx.header["Cache-Control"]     = "no-cache"
        ngx.header["X-Accel-Buffering"] = "no"

        local sock = ngx.socket.tcp()
        sock:settimeout(5000)

        local ok, err = sock:connect(ldap_host, ldap_port)
        if not ok then
            ngx.log(ngx.ERR, "ldap-sse: connect failed: ", err)
            ngx.print("event: error\ndata: " .. cjson.encode({ msg = "connect failed" }) .. "\n\n")
            return
        end

        local conn = lualdap.init()
        local ok, err = conn:init_fd(sock, ldap_bind, ldap_pass, true)
        if not ok then
            ngx.log(ngx.ERR, "ldap-sse: bind failed: ", tostring(err))
            ngx.print("event: error\ndata: " .. cjson.encode({ msg = "bind failed" }) .. "\n\n")
            return
        end

        local iter, search = conn:search_persistent(sock, ldap_base, ldap_filter, "sub", ldap_attrs, {
            cookie   = ldap_cookie,
            proxy_id = ngx.var.arg_proxy_id,
        })

        -- Send the response headers eagerly so a client doing
        -- read-headers-then-read-body doesn't block until the first
        -- event body arrives. The refresh phase can take noticeable
        -- time on a populated tree, and a filter that matches nothing
        -- emits zero entries before streamBegins.
        ngx.send_headers()
        ngx.flush(true)

        --
        -- Event ordering:
        --   "entry"        - one per matching entry as the server enumerates
        --                    them during the syncrepl refresh phase.
        --   "streamBegins" - emitted once, when the server finishes the
        --                    refresh phase (RFC 4533 refreshDone) and
        --                    enters persist mode. After this marker every
        --                    change to a matching entry produces a
        --                    per-entry notification. Clients that need
        --                    deterministic "do op -> expect SSE event"
        --                    semantics MUST wait for streamBegins before
        --                    issuing the op; otherwise their change can
        --                    race the refresh->persist transition.
        --   "entry"        - live notifications from the persist phase.
        --

        --
        -- Persistent search iter() yields self-describing tuples:
        --   ("entry", dn, attrs, meta?)     per-entry notification
        --   ("streamBegins", { syncCookie }) refresh->persist marker
        --   nil                               end of search
        --
        while true do
            local ok, kind, a, b, c = pcall(iter, iter_timeout)
            if not ok then
                ngx.log(ngx.ERR, "ldap-sse: iterator error: ", tostring(kind))
                break
            end
            if kind == nil then
                -- search ended (server sent SEARCH_RESULT)
                break
            end
            if kind == "streamBegins" then
                local meta = a
                local id_line = ""
                if meta and meta.syncCookie then
                    id_line = "id: " .. meta.syncCookie .. "\n"
                end
                local sent = ngx.print("event: streamBegins\n" .. id_line .. "data: {}\n\n")
                if not sent then break end
                ngx.flush(true)
            elseif kind == "entry" then
                local dn, attrs, meta = a, b, c
                local record = { dn = dn, attrs = attrs }
                local id_line = ""
                if meta then
                    -- syncrepl metadata lives at the top level alongside dn
                    record.entryUUID = meta.entryUUID
                    record.syncOp = meta.state
                    if meta.syncCookie then
                        record.syncCookie = meta.syncCookie
                        id_line = "id: " .. meta.syncCookie .. "\n"
                    end
                end
                local sent, err = ngx.print("event: entry\n" .. id_line .. "data: " .. cjson.encode(record) .. "\n\n")
                if not sent then
                    -- client disconnected; cleanup is handled by __gc on search/conn
                    break
                end
                ngx.flush(true)
            else
                ngx.log(ngx.WARN, "ldap-sse: unknown iter kind: ", tostring(kind))
            end
        end

        -- Explicit GC nudge so the search abandon and LDAP unbind happen
        -- promptly rather than waiting for the next GC cycle.
        search = nil
        conn:close()
        collectgarbage()
    }
}
