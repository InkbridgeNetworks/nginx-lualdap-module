location = /ldap-sse {
    default_type    text/event-stream;
    lua_http10_buffering off;

    content_by_lua_block {
        local lualdap = require("ngx_lualdap")
        local cjson   = require("cjson")

        local ldap_host    = ngx.var.arg_host   or "127.0.0.1"
        local ldap_port    = tonumber(ngx.var.arg_port)   or 1389
        local ldap_base    = ngx.var.arg_base   or "dc=example,dc=org"
        local ldap_bind    = ngx.var.arg_bind   or "cn=manager,dc=example,dc=org"
        local ldap_pass    = ngx.var.arg_pass   or "password"
        local ldap_filter  = ngx.var.arg_filter or "(objectClass=*)"
        local ldap_attrs   = ngx.var.arg_attrs
        local iter_timeout = 0  -- 0 = no timeout; iter() yields the coroutine until the next LDAP message arrives

        ngx.header["Content-Type"]      = "text/event-stream"
        ngx.header["Cache-Control"]     = "no-cache"
        ngx.header["X-Accel-Buffering"] = "no"

        local sock = ngx.socket.tcp()
        sock:settimeout(5000)

        local ok, err = sock:connect(ldap_host, ldap_port)
        if not ok then
            ngx.log(ngx.ERR, "ldap-sse: connect failed: ", err)
            ngx.print("event: error\ndata: " .. cjson.encode({ msg = "connect failed" }) .. "\n\n")
            return
        end

        local conn = lualdap.init()
        local ok, err = conn:init_fd(sock, ldap_bind, ldap_pass, true)
        if not ok then
            ngx.log(ngx.ERR, "ldap-sse: bind failed: ", tostring(err))
            ngx.print("event: error\ndata: " .. cjson.encode({ msg = "bind failed" }) .. "\n\n")
            return
        end

        local iter, search = conn:search_persistent(sock, {
            base   = ldap_base,
            scope  = "sub",
            filter = ldap_filter,
            attrs  = ldap_attrs,
        })

        ngx.print("event: ready\ndata: {}\n\n")
        ngx.flush(true)

        while true do
            local ok, dn, attrs, meta = pcall(iter, iter_timeout)
            if not ok then
                ngx.log(ngx.ERR, "ldap-sse: iterator error: ", tostring(dn))
                break
            end
            if dn == nil then
                -- search ended (server sent SEARCH_RESULT)
                break
            end
            local record = { dn = dn, attrs = attrs }
            local id_line = ""
            if meta then
                -- syncrepl metadata lives at the top level alongside dn
                record.entryUUID = meta.entryUUID
                record.syncOp = meta.state
                if meta.syncCookie then
                    record.syncCookie = meta.syncCookie
                    -- SSE id: lets the client send Last-Event-ID on reconnect.
                    -- OpenLDAP cookies are printable ASCII; if a future server
                    -- emits binary, base64 here.
                    id_line = "id: " .. meta.syncCookie .. "\n"
                end
            end
            local sent, err = ngx.print("event: entry\n" .. id_line .. "data: " .. cjson.encode(record) .. "\n\n")
            if not sent then
                -- client disconnected; cleanup is handled by __gc on search/conn
                break
            end
            ngx.flush(true)
        end

        -- Explicit GC nudge so the search abandon and LDAP unbind happen
        -- promptly rather than waiting for the next GC cycle.
        search = nil
        conn:close()
        collectgarbage()
    }
}
